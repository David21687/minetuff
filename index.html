<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MineTuff</title>

<style>
body{
    font-family:Arial,sans-serif;
    background:#1e1e1e;
    color:white;
    text-align:center;
    padding:40px;
}
.card{
    max-width:450px;
    margin:auto;
    background:#2b2b2b;
    padding:25px;
    border-radius:15px;
}
button{
    width:100%;
    padding:15px;
    margin-top:15px;
    border:none;
    border-radius:10px;
    font-size:18px;
    cursor:pointer;
}
.open{
    background:#4CAF50;
    color:white;
}
.copy{
    background:#2196F3;
    color:white;
}
.code{
    background:#111;
    padding:12px;
    border-radius:8px;
    margin-top:10px;
    font-size:18px;
}
</style>
</head>

<body>

<div class="card">

<h1>🎮 MineTuff</h1>

<p>Apasă butonul de mai jos pentru a deschide Minecraft.</p>

<div class="code">
IP: <b>162.55.100.208</b><br>
Port: <b>21115</b>
</div>

<button class="open"
onclick="window.location.href='minecraft://?addExternalServer=MineTuff|162.55.100.208|21115';">
🚀 Deschide Minecraft
</button>

<button class="copy"
onclick="navigator.clipboard.writeText('162.55.100.208:21115').then(()=>alert('IP copiat!'));">

📋 Copiază IP-ul
</button>

</div>

</body>
</html>
